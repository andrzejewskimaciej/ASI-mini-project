# środowisko deweloperskie
# uruchomienie: docker compose -f docker-compose.dev.yml up --build
#
# hot-reload kodu, baza na porcie 5432, nginx bez cache, logi DEBUG

services:

  db:
    image: postgres:15-alpine
    container_name: weather_postgres_dev
    env_file:
      - .env.dev
    environment:
      # logujemy wszystkie zapytania SQL w dev
      POSTGRES_LOG_MIN_DURATION_STATEMENT: "0"
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      target: dev
    container_name: weather_backend_dev
    ports:
      - "8000:8000" # FastAPI + Swagger UI: http://localhost:8000/docs
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app # live-mount: edycja kodu → reload bez rebuild
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  ingestion:
    build:
      context: ./ingestion
      target: dev
    container_name: weather_ingestion_dev
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
      PYTHONUNBUFFERED: "1"
      ENV: development
      LOG_LEVEL: debug
      INGESTION_WORKERS: "5"
    volumes:
      - ./ingestion:/app # live-mount
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: weather_frontend_dev
    ports:
      - "8080:80" # UI: http://localhost:8080
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/style.css:/usr/share/nginx/html/style.css
      - ./frontend/app.js:/usr/share/nginx/html/app.js
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_network

volumes:
  pgdata_dev:

networks:
  app_network:
    driver: bridge