# nginx prod: gzip + cache statycznych assetów + proxy do backendu
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # assety: cache 1 dzień, przeglądarka nie sprawdza
    location ~* \.(css|js|ico|png|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
    }

    # proxy do backendu — w k8s nazwa serwisu to backend-service
    location /api/ {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    server_tokens off; # ukrywa wersję nginx w nagłówkach

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
