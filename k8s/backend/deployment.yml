apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: weather-prod
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: weather-aqi-system
    app.kubernetes.io/component: api
spec:
  replicas: 2 # dwie repliki
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1 # maksymalnie jeden dodatkowy pod w trakcie wdrożenia
      maxUnavailable: 0 # brak przerw w działaniu, zawsze są aktywne pody
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: weather-aqi-backend:prod
          imagePullPolicy: Never # obraz ładowany lokalnie z kind
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: weather-config
            - secretRef:
                name: weather-secret

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          # test gotowości, fastapi zaczyna odbierać ruch dopiero po uruchomieniu
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6

          # test żywotności, restartuje pod gdy aplikacja zawiesi się
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
