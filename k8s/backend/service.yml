apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: weather-prod
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: weather-aqi-system
    app.kubernetes.io/component: api
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800 # mapowany na port hosta 8000 w kind
      protocol: TCP
