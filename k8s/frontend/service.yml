apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: weather-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: weather-aqi-system
    app.kubernetes.io/component: ui
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30880 # mapowany na port hosta 8080 w kind
      protocol: TCP
