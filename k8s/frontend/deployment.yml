apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: weather-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: weather-aqi-system
    app.kubernetes.io/component: ui
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: weather-aqi-frontend:prod
          imagePullPolicy: Never
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
