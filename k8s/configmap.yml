# zmienne środowiskowe bez sekretów — hasła są w Secret
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-config
  namespace: weather-prod
  labels:
    app.kubernetes.io/part-of: weather-aqi-system
data:
  DB_HOST: "db-service" # nazwa Service k8s dla PostgreSQL
  DB_PORT: "5432"
  POSTGRES_DB: "weather_aqi_db"
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: "info"
  INGESTION_WORKERS: "5"
  # token 'demo' ignoruje koordynaty, zastąp własnym z https://aqicn.org/data-platform/token/
  AQICN_TOKEN: "demo"
